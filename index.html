<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Наряды и фоны</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    body {
      position: relative;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      background: #ffffff;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 0.35s ease, background-image 0.35s ease, background-color 0.35s ease;
      z-index: 0;
    }

    .soft-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
      z-index: 1;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: 2;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      font-size: 26px;
      color: #111;
      pointer-events: none;
      z-index: 20;
      text-align: center;
      background: rgba(255,255,255,0.7);
      padding: 8px 14px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    .panel {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 35;
      width: 250px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 22px;
      padding: 16px 16px 14px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(8px);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #111;
    }

    .panel-list {
      margin: 0;
      padding-left: 18px;
      color: #222;
      line-height: 1.55;
      font-size: 15px;
    }

    .top-buttons {
      position: fixed;
      right: 20px;
      top: 20px;
      z-index: 40;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 320px;
    }

    .ui-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .ui-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
    }

    .speech {
      position: absolute;
      min-width: 92px;
      max-width: 220px;
      padding: 10px 14px;
      border-radius: 18px;
      background: white;
      color: #111;
      font-size: 18px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      pointer-events: none;
      opacity: 0;
      transform: translateY(16px) scale(0.85);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 50;
      white-space: nowrap;
    }

    .speech::after {
      content: "";
      position: absolute;
      left: 26px;
      bottom: -10px;
      width: 18px;
      height: 18px;
      background: white;
      transform: rotate(45deg);
      border-radius: 4px;
    }

    .speech.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .sprite {
      position: absolute;
      width: 280px;
      height: 280px;
      transform-origin: center center;
      cursor: grab;
      user-select: none;
      touch-action: none;
      will-change: left, top, transform;
      z-index: 10;
    }

    .sprite:active {
      cursor: grabbing;
    }

    .sprite img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      display: block;
      filter: drop-shadow(0 16px 24px rgba(0, 0, 0, 0.18));
    }

    .status-box {
      position: fixed;
      right: 20px;
      top: 82px;
      z-index: 38;
      background: rgba(255,255,255,0.88);
      border-radius: 18px;
      padding: 10px 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      backdrop-filter: blur(8px);
      font-size: 14px;
      color: #222;
      min-width: 170px;
      line-height: 1.45;
    }

    @media (max-width: 700px) {
      .panel {
        width: 210px;
        padding: 14px;
      }

      .panel-list {
        font-size: 13px;
      }

      .hint {
        font-size: 20px;
        bottom: 18px;
      }

      .sprite {
        width: 220px;
        height: 220px;
      }

      .status-box {
        top: 132px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-layer" id="bgLayer"></div>
  <div class="soft-overlay"></div>

  <div class="stage">
    <div class="panel">
      <div class="panel-title">Наряды ✧</div>
      <ol class="panel-list">
        <li>обычный наряд</li>
        <li value="3">старый наряд</li>
        <li value="4">купальник</li>
        <li value="5">некопара! (чокола)</li>
        <li value="6">кангел!</li>
        <li value="7">мадока!</li>
        <li value="8">… 0_0</li>
      </ol>
    </div>

    <div class="top-buttons">
      <button class="ui-btn" id="resetBtn">в центр</button>
      <button class="ui-btn" id="bgBtn">фон!!</button>
      <button class="ui-btn" id="dressBtn">нажми!</button>
    </div>

    <div class="status-box" id="statusBox">
      наряд: <b id="outfitName">обычный наряд</b><br>
      фон: <b id="bgName">белый</b>
    </div>

    <div class="speech" id="speech">вау!</div>

    <div class="sprite" id="sprite">
      <img id="face" src="1.png" alt="sprite" draggable="false" />
    </div>

    <div class="hint">потяни меня! ( &gt; . &lt; )</div>
  </div>

  <script>
    const sprite = document.getElementById("sprite");
    const face = document.getElementById("face");
    const speech = document.getElementById("speech");
    const resetBtn = document.getElementById("resetBtn");
    const dressBtn = document.getElementById("dressBtn");
    const bgBtn = document.getElementById("bgBtn");
    const bgLayer = document.getElementById("bgLayer");
    const outfitName = document.getElementById("outfitName");
    const bgName = document.getElementById("bgName");

    const SIZE = window.innerWidth <= 700 ? 220 : 280;

    const outfits = [
      { file: "1.png", label: "обычный наряд" },
      { file: "3.png", label: "старый наряд" },
      { file: "4.png", label: "купальник" },
      { file: "5.png", label: "некопара! (чокола)" },
      { file: "6.png", label: "кангел!" },
      { file: "7.png", label: "мадока!" },
      { file: "8.png", label: "… 0_0" }
    ];

    const backgrounds = [
      { file: "", label: "белый" },
      { file: "a.png", label: "Некопара фон" },
      { file: "b.png", label: "миленький фон" },
      { file: "c.png", label: "еще один миленький фон" }
    ];

    const outfitPhrases = ["вау!", "ухты!", "красиво!", "я знаю эту игру!"];
    const bgPhrases = ["фончик!", "милота!", "ух ты!", "красивый фон!"];
    const grabPhrases = ["эээ", "мя", "ай", "ой", "э!", ">.<", "пу"];
    const dropPhrases = ["плюх", "бумп", "ой", "мяу", "ыы"];
    const resetPhrases = ["оп", "в центр!", "хоп", "ой"];

    let currentOutfit = 0;
    let currentBg = 0;

    let x = window.innerWidth / 2 - SIZE / 2;
    let y = window.innerHeight / 2 - SIZE / 2;

    let isDragging = false;
    let pointerId = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    let targetX = x;
    let targetY = y;

    let velX = 0;
    let velY = 0;

    let jellyScaleX = 1;
    let jellyScaleY = 1;
    let jellyRotation = 0;

    let speechTimer = null;
    let audioCtx = null;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playPluhSound() {
      try {
        ensureAudio();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(70, now + 0.12);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(700, now);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + 0.15);
      } catch (e) {}
    }

    function updateStatus() {
      outfitName.textContent = outfits[currentOutfit].label;
      bgName.textContent = backgrounds[currentBg].label;
    }

    function applyBackground() {
      const bg = backgrounds[currentBg];
      if (!bg.file) {
        bgLayer.style.backgroundColor = "#ffffff";
        bgLayer.style.backgroundImage = "none";
      } else {
        bgLayer.style.backgroundColor = "#ffffff";
        bgLayer.style.backgroundImage = `url("${bg.file}")`;
      }
      updateStatus();
    }

    function moveSpeech() {
      speech.style.left = (x + SIZE / 2 - 40) + "px";
      speech.style.top = (y - 42) + "px";
    }

    function showSpeech(text) {
      speech.textContent = text;
      moveSpeech();
      speech.classList.add("show");

      clearTimeout(speechTimer);
      speechTimer = setTimeout(() => {
        speech.classList.remove("show");
      }, 1300);
    }

    function render() {
      sprite.style.left = x + "px";
      sprite.style.top = y + "px";
      sprite.style.transform = `scale(${jellyScaleX}, ${jellyScaleY}) rotate(${jellyRotation}deg)`;
      moveSpeech();
    }

    function loop() {
      const dx = targetX - x;
      const dy = targetY - y;

      velX += dx * 0.16;
      velY += dy * 0.16;

      velX *= 0.72;
      velY *= 0.72;

      x += velX;
      y += velY;

      const stretchX = 1 + Math.min(Math.abs(velX) / 18, 0.42);
      const stretchY = 1 + Math.min(Math.abs(velY) / 18, 0.42);

      const squashX = 1 - Math.min(Math.abs(velY) / 30, 0.2);
      const squashY = 1 - Math.min(Math.abs(velX) / 30, 0.2);

      const targetScaleX = stretchX * squashX;
      const targetScaleY = stretchY * squashY;

      jellyScaleX += (targetScaleX - jellyScaleX) * 0.22;
      jellyScaleY += (targetScaleY - jellyScaleY) * 0.22;

      const desiredRotation = clamp(velX * 1.2, -22, 22);
      jellyRotation += (desiredRotation - jellyRotation) * 0.18;

      if (!isDragging) {
        jellyScaleX += (1 - jellyScaleX) * 0.14;
        jellyScaleY += (1 - jellyScaleY) * 0.14;
        jellyRotation += (0 - jellyRotation) * 0.1;
      }

      render();
      requestAnimationFrame(loop);
    }

    dressBtn.addEventListener("click", () => {
      currentOutfit = (currentOutfit + 1) % outfits.length;
      face.src = outfits[currentOutfit].file;
      updateStatus();
      showSpeech(pick(outfitPhrases));
    });

    bgBtn.addEventListener("click", () => {
      currentBg = (currentBg + 1) % backgrounds.length;
      applyBackground();
      showSpeech(pick(bgPhrases));
    });

    sprite.addEventListener("pointerdown", (e) => {
      isDragging = true;
      pointerId = e.pointerId;

      dragOffsetX = e.clientX - x;
      dragOffsetY = e.clientY - y;

      targetX = x;
      targetY = y;
      velX = 0;
      velY = 0;

      showSpeech(pick(grabPhrases));
      sprite.setPointerCapture(pointerId);
    });

    sprite.addEventListener("pointermove", (e) => {
      if (!isDragging || e.pointerId !== pointerId) return;

      targetX = clamp(e.clientX - dragOffsetX, 0, window.innerWidth - SIZE);
      targetY = clamp(e.clientY - dragOffsetY, 0, window.innerHeight - SIZE);
    });

    function stopDragging() {
      if (!isDragging) return;
      isDragging = false;
      pointerId = null;
      playPluhSound();
      showSpeech(pick(dropPhrases));
    }

    sprite.addEventListener("pointerup", stopDragging);
    sprite.addEventListener("pointercancel", stopDragging);
    sprite.addEventListener("lostpointercapture", stopDragging);

    resetBtn.addEventListener("click", () => {
      targetX = window.innerWidth / 2 - SIZE / 2;
      targetY = window.innerHeight / 2 - SIZE / 2;
      showSpeech(pick(resetPhrases));
    });

    window.addEventListener("resize", () => {
      x = clamp(x, 0, window.innerWidth - SIZE);
      y = clamp(y, 0, window.innerHeight - SIZE);
      targetX = clamp(targetX, 0, window.innerWidth - SIZE);
      targetY = clamp(targetY, 0, window.innerHeight - SIZE);
      render();
    });

    applyBackground();
    updateStatus();
    render();
    loop();
  </script>
</body>
</html>
